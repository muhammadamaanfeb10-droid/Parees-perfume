  <div class="container box-shadow-lg border-rounded">
    <div class="row mt-5 CONTACTFORM shadow rounded-3 bg-light p-5">
      <div class="col-lg-6 col-md-6 col-12 contact-left">
        <h4 class="">Call Us</h4>
        <p>021-12345-6789</p>
        <h4 class="">Email Us</h4>
        <!-- <p>Aptech@gmail.com</p> -->
        <p>
          <a href="https://mail.google.com/mail/?view=cm&to=info@yourdomain.com">PaareesPerfume@gmail.com</a>
        </p>
        <!-- mailto:info@paareesperfume.com -->
        <h4 class="">Address</h4>
        <p> Metro Star Gate Sharah-e-Faisal</p>

      <div class="col-lg-6 col-md-6 col-12">

            <div class="col-lg-12 col-md-12 col-12">
              <div class="row">
                <div class="col-lg-6 col-md-6 col-12">
                  <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Name</label>
                    <input type="text" class="form-control" />
                  </div>
                </div>
                <div class="col-lg-6 col-md-6 col-12">

                  <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email</label>
                    <input type="email" class="form-control" />

                  </div>

                </div>
              </div>
            </div>

            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Subject</label>
              <input type="text" class="form-control" />

            </div>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Message</label>
              <textarea name="" id="" class="form-control"></textarea>

            </div>

            <button type="submit" class="btn btn-outline-info form-control bg-info text-white fw-bold">Submit</button>
          </form>
        </div>
      </div>
    </div>




<div class="container mt-5">
